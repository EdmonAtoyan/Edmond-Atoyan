# Visit https://github.com/lowlighter/metrics/blob/master/action.yml for full reference
name: Metrics

on:
  schedule: [{cron: "0 */12 * * *"}]
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest

    steps:
      - uses: lowlighter/metrics@latest
        with:
          # Create a personal access token and save it as the METRICS repository secret.
          token: ${{ secrets.METRICS }}
          # GitHub provides this token automatically for workflow commits.
          committer_token: ${{ secrets.GITHUB_TOKEN }}

          user: EdmonAtoyan
          template: classic
          base: header, activity, metadata, repositories, community
          plugin_lines: yes
          plugin_stargazers: yes
          config_timezone: Asia/Yerevan
          plugin_followup: yes
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          plugin_languages: yes
